# ============================================================
# Déploiement VPS — nginx (reverse proxy) + frontend + backend + postgres.
# Usage :  docker compose -f docker-compose.prod.yml up -d --build
# Seul nginx est exposé publiquement (port HTTP_PORT). frontend/backend restent internes.
# HTTPS : à gérer au niveau de l'hôte (Cloudflare devant, ou certbot) — voir DEPLOY.md.
# ============================================================

services:
  nginx:
    image: nginx:alpine
    container_name: externam_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    networks:
      - externam

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: externam_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: http://backend:8000 # interne : le proxy Next -> backend
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - externam

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: externam_backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      # Soit DATABASE_URL (base externe), soit les POSTGRES_* (conteneur postgres ci-dessous).
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_FIRSTNAME: ${SEED_ADMIN_FIRSTNAME}
      SEED_ADMIN_LASTNAME: ${SEED_ADMIN_LASTNAME}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH}
      ACCESS_TOKEN_EXPIRATION: ${ACCESS_TOKEN_EXPIRATION}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION}
      BASE_URL: ${BASE_URL}
      FRONT_BASE_URL: ${FRONT_BASE_URL}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SENTRY_URL: ${SENTRY_URL}
    volumes:
      - ./apps/backend/keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - externam

  postgres:
    image: postgres:16-alpine
    container_name: externam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - externam

networks:
  externam:
    driver: bridge

volumes:
  postgres_data:
