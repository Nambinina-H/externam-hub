# Reverse proxy VPS — tout passe par le front Next.js (frontend:3000),
# qui relaie lui-même /api vers le backend (modèle « Next = portail », cohérent avec Vercel+Railway).
# HTTPS : géré au niveau de l'hôte (Cloudflare devant, ou certbot) — voir DEPLOY.md.

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Support WebSocket (si tu en ajoutes côté Next/API plus tard)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
